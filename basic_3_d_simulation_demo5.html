<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Procedural Planet Generator</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:sans-serif}
#ui{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.65);color:white;padding:12px;border-radius:10px}
button{margin-top:5px}
</style>
</head>
<body>

<div id="ui">
<b>Procedural Planet Generator</b><br>
Mouse: rotate<br>
Scroll: zoom<br>
<button onclick="regeneratePlanet()">Generate New Planet</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ---------------- ENGINE ----------------

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
10000
)

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setPixelRatio(window.devicePixelRatio)
document.body.appendChild(renderer.domElement)

const controls = new THREE.OrbitControls(camera, renderer.domElement)
controls.enableDamping = true

camera.position.set(0,120,260)

const ambient = new THREE.AmbientLight(0xffffff,.3)
scene.add(ambient)

const light = new THREE.DirectionalLight(0xffffff,1)
light.position.set(200,200,200)
scene.add(light)

// star background
const starsGeo = new THREE.BufferGeometry()
const starCount = 8000
const starPositions=[]

for(let i=0;i<starCount;i++){
 starPositions.push((Math.random()-.5)*6000)
 starPositions.push((Math.random()-.5)*6000)
 starPositions.push((Math.random()-.5)*6000)
}

starsGeo.setAttribute("position",new THREE.Float32BufferAttribute(starPositions,3))

const stars = new THREE.Points(
 starsGeo,
 new THREE.PointsMaterial({color:0xffffff,size:2})
)

scene.add(stars)

// ---------------- PERLIN NOISE ----------------

const permutation=[151,160,137,91,90,15,
131,13,201,95,96,53,194,233,7,225,140,36,103,30,
69,142,8,99,37,240,21,10,23,
190, 6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,
35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,
168, 68,175,74,165,71,134,139,48,27,166,
77,146,158,231,83,111,229,122,60,211,133,230,220,105,
92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,
80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,
188,159,86,164,100,109,198,173,186,3,64,52,217,226,250,
124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,
227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,
152, 2,44,154,163, 70,221,153,101,155,167,
43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,
178,185,112,104,218,246,97,228,251,34,242,193,238,210,
144,12,191,179,162,241, 81,51,145,235,249,14,239,107,
49,192,214, 31,181,199,106,157,184, 84,204,176,115,
121,50,45,127,  4,150,254,138,236,205,93,222,114, 67,
29,24,72,243,141,128,195,78,66,215,61,156,180]

let p=new Array(512)
for(let i=0;i<512;i++) p[i]=permutation[i%256]

function fade(t){return t*t*t*(t*(t*6-15)+10)}
function lerp(t,a,b){return a+t*(b-a)}
function grad(hash,x,y,z){
 let h=hash&15
 let u=h<8?x:y
 let v=h<4?y:h===12||h===14?x:z
 return((h&1)===0?u:-u)+((h&2)===0?v:-v)
}

function noise(x,y,z){
 let X=Math.floor(x)&255
 let Y=Math.floor(y)&255
 let Z=Math.floor(z)&255

 x-=Math.floor(x)
 y-=Math.floor(y)
 z-=Math.floor(z)

 let u=fade(x)
 let v=fade(y)
 let w=fade(z)

 let A=p[X]+Y
 let AA=p[A]+Z
 let AB=p[A+1]+Z
 let B=p[X+1]+Y
 let BA=p[B]+Z
 let BB=p[B+1]+Z

 return lerp(w,
  lerp(v,
   lerp(u,grad(p[AA],x,y,z),grad(p[BA],x-1,y,z)),
   lerp(u,grad(p[AB],x,y-1,z),grad(p[BB],x-1,y-1,z))
  ),
  lerp(v,
   lerp(u,grad(p[AA+1],x,y,z-1),grad(p[BA+1],x-1,y,z-1)),
   lerp(u,grad(p[AB+1],x,y-1,z-1),grad(p[BB+1],x-1,y-1,z-1))
  )
 )
}

// ---------------- PLANET GENERATION ----------------

let planet

function generatePlanet(){

 if(planet) scene.remove(planet)

 const radius=70
 const segments=200

 const geometry=new THREE.SphereGeometry(radius,segments,segments)
 const position=geometry.attributes.position

 const colors=[]

 for(let i=0;i<position.count;i++){

  let x=position.getX(i)
  let y=position.getY(i)
  let z=position.getZ(i)

  const nx=x/radius
  const ny=y/radius
  const nz=z/radius

  let elevation=0

  let scale=1.5
  let amp=1

  for(let o=0;o<5;o++){
   elevation+=noise(nx*scale,ny*scale,nz*scale)*amp
   scale*=2
   amp*=0.5
  }

  const height=elevation*8

  const length=Math.sqrt(x*x+y*y+z*z)

  const newLength=radius+height

  x=(x/length)*newLength
  y=(y/length)*newLength
  z=(z/length)*newLength

  position.setXYZ(i,x,y,z)

  // color by elevation

  if(height<-2) colors.push(.02,.1,.5) // ocean
  else if(height<0) colors.push(.1,.3,.8) // shallow
  else if(height<3) colors.push(.1,.5,.2) // land
  else if(height<6) colors.push(.4,.4,.3) // mountain
  else colors.push(1,1,1) // snow
 }

 geometry.setAttribute("color",new THREE.Float32BufferAttribute(colors,3))
 geometry.computeVertexNormals()

 const material=new THREE.MeshStandardMaterial({
  vertexColors:true,
  roughness:.9,
  metalness:0
 })

 planet=new THREE.Mesh(geometry,material)

 scene.add(planet)

}

function regeneratePlanet(){
 generatePlanet()
}

// atmosphere
const atmosphereGeo=new THREE.SphereGeometry(72,128,128)
const atmosphereMat=new THREE.MeshBasicMaterial({
 color:0x3399ff,
 transparent:true,
 opacity:.15
})

const atmosphere=new THREE.Mesh(atmosphereGeo,atmosphereMat)
scene.add(atmosphere)

// generate first planet

generatePlanet()

// ---------------- ANIMATION ----------------

function animate(){
 requestAnimationFrame(animate)

 if(planet) planet.rotation.y+=0.001
 atmosphere.rotation.y+=0.0005

 controls.update()
 renderer.render(scene,camera)
}

animate()

// resize

window.addEventListener("resize",()=>{
 camera.aspect=window.innerWidth/window.innerHeight
 camera.updateProjectionMatrix()
 renderer.setSize(window.innerWidth,window.innerHeight)
})

</script>

</body>
</html>
