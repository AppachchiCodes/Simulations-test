<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galaxy → Solar System Explorer</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:sans-serif}
#ui{
position:absolute;
top:10px;left:10px;
background:rgba(0,0,0,.6);
color:white;padding:10px;border-radius:8px
}
button{margin-top:4px}
</style>
</head>
<body>

<div id="ui">
<b>Galaxy Explorer</b><br>
Mouse drag: rotate<br>
Scroll: zoom<br>
Click planet: focus<br>
<button onclick="focusSun()">Go To Sun</button>
<button onclick="focusGalaxy()">Go To Galaxy</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// BASIC ENGINE

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
10000
)

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const controls = new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true

camera.position.set(0,120,350)

// lighting
const ambient = new THREE.AmbientLight(0xffffff,0.15)
scene.add(ambient)

const sunLight = new THREE.PointLight(0xffffff,2,5000)
scene.add(sunLight)

// MILKY WAY (MATH SPIRAL)

const starCount = 20000
const galaxyGeo = new THREE.BufferGeometry()

const positions=[]
const colors=[]

for(let i=0;i<starCount;i++){

 const radius = Math.random()*2000

 const branches = 4
 const branch = i % branches

 const spin = radius * 0.002
 const angle = (branch/branches)*Math.PI*2 + spin

 const randomX = (Math.random()-0.5)*40
 const randomY = (Math.random()-0.5)*40
 const randomZ = (Math.random()-0.5)*40

 const x = Math.cos(angle)*radius + randomX
 const y = randomY
 const z = Math.sin(angle)*radius + randomZ

 positions.push(x,y,z)

 const color = new THREE.Color()
 color.setHSL(0.6+Math.random()*0.2,1,0.8)

 colors.push(color.r,color.g,color.b)
}

galaxyGeo.setAttribute(
"position",
new THREE.Float32BufferAttribute(positions,3)
)

galaxyGeo.setAttribute(
"color",
new THREE.Float32BufferAttribute(colors,3)
)

const galaxyMat = new THREE.PointsMaterial({
size:2,
vertexColors:true
})

const galaxy = new THREE.Points(galaxyGeo,galaxyMat)
scene.add(galaxy)

// SUN 

const sunGeo = new THREE.SphereGeometry(20,64,64)
const sunMat = new THREE.MeshBasicMaterial({color:0xffcc33})
const sun = new THREE.Mesh(sunGeo,sunMat)
scene.add(sun)

sunLight.position.copy(sun.position)

//PLANETS

const planetData=[
{name:"Mercury",size:2,dist:60,speed:.02,color:0xaaaaaa},
{name:"Venus",size:4,dist:90,speed:.015,color:0xffcc99},
{name:"Earth",size:4.5,dist:120,speed:.01,color:0x3399ff},
{name:"Mars",size:3.5,dist:150,speed:.008,color:0xff5533},
{name:"Jupiter",size:10,dist:220,speed:.004,color:0xffaa88},
{name:"Saturn",size:9,dist:300,speed:.003,color:0xffddaa},
{name:"Uranus",size:7,dist:360,speed:.002,color:0x99ffff},
{name:"Neptune",size:7,dist:420,speed:.0015,color:0x3366ff}
]

const planets=[]

planetData.forEach(data=>{

 const geo=new THREE.SphereGeometry(data.size,64,64)
 const mat=new THREE.MeshStandardMaterial({color:data.color,roughness:.8,metalness:.1})

 const mesh=new THREE.Mesh(geo,mat)
 scene.add(mesh)

 planets.push({
 mesh:mesh,
 angle:Math.random()*Math.PI*2,
 dist:data.dist,
 speed:data.speed
 })

})

// Saturn rings
const ringGeo=new THREE.RingGeometry(12,18,64)
const ringMat=new THREE.MeshBasicMaterial({color:0xddddaa,side:THREE.DoubleSide})
const ring=new THREE.Mesh(ringGeo,ringMat)
ring.rotation.x=Math.PI/2
planets[5].mesh.add(ring)

// ORBITS

planetData.forEach(p=>{

 const curve=new THREE.EllipseCurve(0,0,p.dist,p.dist,0,2*Math.PI)
 const pts=curve.getPoints(200)

 const geo=new THREE.BufferGeometry().setFromPoints(
 pts.map(pt=>new THREE.Vector3(pt.x,0,pt.y))
 )

 const mat=new THREE.LineBasicMaterial({color:0x333333})
 const orbit=new THREE.LineLoop(geo,mat)

 scene.add(orbit)

})

// INTERACTION

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

window.addEventListener("click",e=>{

 mouse.x=(e.clientX/window.innerWidth)*2-1
 mouse.y=-(e.clientY/window.innerHeight)*2+1

 raycaster.setFromCamera(mouse,camera)

 const planetMeshes=planets.map(p=>p.mesh)
 const intersects=raycaster.intersectObjects(planetMeshes)

 if(intersects.length>0){

  const target=intersects[0].object

  controls.target.copy(target.position)

 }

})

function focusSun(){
 controls.target.copy(sun.position)
}

function focusGalaxy(){
 controls.target.set(0,0,0)
 camera.position.set(0,400,900)
}

// ANIMATION

function animate(){

 requestAnimationFrame(animate)

 galaxy.rotation.y+=0.0005
 sun.rotation.y+=0.002

 planets.forEach(p=>{

  p.angle+=p.speed

  p.mesh.position.x=Math.cos(p.angle)*p.dist
  p.mesh.position.z=Math.sin(p.angle)*p.dist

  p.mesh.rotation.y+=0.01

 })

 controls.update()
 renderer.render(scene,camera)

}

animate()

// RESIZE 

window.addEventListener("resize",()=>{

 camera.aspect=window.innerWidth/window.innerHeight
 camera.updateProjectionMatrix()
 renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
