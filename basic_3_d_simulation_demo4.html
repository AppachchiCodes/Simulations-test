<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Galaxy Explorer</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:sans-serif}
#ui{
position:absolute;top:10px;left:10px;
background:rgba(0,0,0,.6);color:white;
padding:12px;border-radius:10px
}
button{margin-top:4px}
</style>
</head>
<body>

<div id="ui">
<b>Galaxy Explorer v2</b><br>
Drag: rotate<br>
Scroll: zoom<br>
Click planet: focus<br>
<button onclick="focusSun()">Sun</button>
<button onclick="focusGalaxy()">Galaxy</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ------------------ BASIC ENGINE ------------------

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
20000
)

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setPixelRatio(window.devicePixelRatio)
document.body.appendChild(renderer.domElement)

const controls=new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true

camera.position.set(0,200,600)

// lighting
const ambient=new THREE.AmbientLight(0xffffff,.2)
scene.add(ambient)

const sunLight=new THREE.PointLight(0xffffff,3,10000)
scene.add(sunLight)

// ------------------ MILKY WAY SPIRAL ------------------

const starCount=30000
const galaxyGeo=new THREE.BufferGeometry()

const positions=[]
const colors=[]

for(let i=0;i<starCount;i++){

 const radius=Math.random()*4000
 const branches=5
 const branch=i%branches

 const spin=radius*.002
 const angle=(branch/branches)*Math.PI*2+spin

 const randomX=(Math.random()-.5)*60
 const randomY=(Math.random()-.5)*60
 const randomZ=(Math.random()-.5)*60

 const x=Math.cos(angle)*radius+randomX
 const y=randomY
 const z=Math.sin(angle)*radius+randomZ

 positions.push(x,y,z)

 const color=new THREE.Color()
 color.setHSL(.55+Math.random()*.2,1,.8)

 colors.push(color.r,color.g,color.b)
}

galaxyGeo.setAttribute("position",new THREE.Float32BufferAttribute(positions,3))
galaxyGeo.setAttribute("color",new THREE.Float32BufferAttribute(colors,3))

const galaxyMat=new THREE.PointsMaterial({
size:2,
vertexColors:true,
transparent:true
})

const galaxy=new THREE.Points(galaxyGeo,galaxyMat)
scene.add(galaxy)

// ------------------ SUN ------------------

const sunGeo=new THREE.SphereGeometry(30,64,64)

const sunMat=new THREE.MeshBasicMaterial({
color:0xffdd66
})

const sun=new THREE.Mesh(sunGeo,sunMat)
scene.add(sun)

sunLight.position.copy(sun.position)

// sun glow
const glowGeo=new THREE.SphereGeometry(40,64,64)
const glowMat=new THREE.MeshBasicMaterial({
color:0xffaa33,
transparent:true,
opacity:.25
})

const glow=new THREE.Mesh(glowGeo,glowMat)
sun.add(glow)

// ------------------ PLANETS ------------------

const planetData=[
{name:"Mercury",size:4,dist:90,speed:.02,color:0xaaaaaa},
{name:"Venus",size:6,dist:130,speed:.015,color:0xffcc99},
{name:"Earth",size:6.5,dist:180,speed:.01,color:0x3399ff},
{name:"Mars",size:5,dist:230,speed:.008,color:0xff5533},
{name:"Jupiter",size:14,dist:340,speed:.004,color:0xffaa88},
{name:"Saturn",size:12,dist:460,speed:.003,color:0xffddaa},
{name:"Uranus",size:10,dist:560,speed:.002,color:0x99ffff},
{name:"Neptune",size:10,dist:660,speed:.0015,color:0x3366ff}
]

const planets=[]

planetData.forEach(data=>{

 const geo=new THREE.SphereGeometry(data.size,64,64)

 const mat=new THREE.MeshStandardMaterial({
 color:data.color,
 roughness:.7,
 metalness:.1
 })

 const mesh=new THREE.Mesh(geo,mat)
 scene.add(mesh)

 planets.push({
 mesh:mesh,
 angle:Math.random()*Math.PI*2,
 dist:data.dist,
 speed:data.speed
 })

})

// Saturn rings
const ringGeo=new THREE.RingGeometry(18,28,100)
const ringMat=new THREE.MeshBasicMaterial({
color:0xddddaa,
side:THREE.DoubleSide,
transparent:true,
opacity:.8
})

const ring=new THREE.Mesh(ringGeo,ringMat)
ring.rotation.x=Math.PI/2
planets[5].mesh.add(ring)

// ------------------ ASTEROID BELT ------------------

const asteroidGeo=new THREE.SphereGeometry(.8,6,6)
const asteroidMat=new THREE.MeshStandardMaterial({color:0x888888})

const asteroids=[]

for(let i=0;i<1200;i++){

 const mesh=new THREE.Mesh(asteroidGeo,asteroidMat)

 const angle=Math.random()*Math.PI*2
 const dist=280+Math.random()*60

 mesh.position.x=Math.cos(angle)*dist
 mesh.position.z=Math.sin(angle)*dist
 mesh.position.y=(Math.random()-.5)*10

 scene.add(mesh)

 asteroids.push({mesh,angle,dist})

}

// ------------------ ORBITS ------------------

planetData.forEach(p=>{

 const curve=new THREE.EllipseCurve(0,0,p.dist,p.dist,0,2*Math.PI)

 const pts=curve.getPoints(300)

 const geo=new THREE.BufferGeometry().setFromPoints(
 pts.map(pt=>new THREE.Vector3(pt.x,0,pt.y))
 )

 const mat=new THREE.LineBasicMaterial({color:0x333333})
 const orbit=new THREE.LineLoop(geo,mat)

 scene.add(orbit)

})

// ------------------ CLICK TO FOCUS ------------------

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

window.addEventListener("click",e=>{

 mouse.x=(e.clientX/window.innerWidth)*2-1
 mouse.y=-(e.clientY/window.innerHeight)*2+1

 raycaster.setFromCamera(mouse,camera)

 const meshes=planets.map(p=>p.mesh)

 const intersects=raycaster.intersectObjects(meshes)

 if(intersects.length>0){

  const target=intersects[0].object

  controls.target.copy(target.position)

 }

})

function focusSun(){
controls.target.copy(sun.position)
}

function focusGalaxy(){
controls.target.set(0,0,0)
camera.position.set(0,600,1400)
}

// ------------------ ANIMATION ------------------

function animate(){

requestAnimationFrame(animate)

// galaxy rotation
galaxy.rotation.y+=0.0003

// sun rotation
sun.rotation.y+=0.002

// planets orbit
planets.forEach(p=>{

 p.angle+=p.speed

 p.mesh.position.x=Math.cos(p.angle)*p.dist
 p.mesh.position.z=Math.sin(p.angle)*p.dist

 p.mesh.rotation.y+=0.01

})

// asteroid belt rotation
asteroids.forEach(a=>{

 a.angle+=0.0008

 a.mesh.position.x=Math.cos(a.angle)*a.dist
 a.mesh.position.z=Math.sin(a.angle)*a.dist

})

controls.update()
renderer.render(scene,camera)

}

animate()

// ------------------ RESIZE ------------------

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
